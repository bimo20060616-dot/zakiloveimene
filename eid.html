<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيمان... أنتِ عيدي</title>
    <style>
        /* ============================================
           GLOBAL VARIABLES & THEME CONFIGURATION
           ============================================ */
        :root {
            --primary-pink: #ff69b4;
            --primary-gold: #ffd700;
            --primary-purple: #b366ff;
            --primary-lavender: #e6d5ff;
            --dark-sky: #0a0e27;
            --dark-sky-2: #1a1f3a;
            --light-pink: #ffe6f0;
            --soft-white: #f5f1ff;
            --glow-pink: #ff1493;
            --glow-gold: #ffed4e;
            --glow-purple: #d946ff;
            --accent-cyan: #00d9ff;
            --text-dark: #1a1a2e;
            --text-light: #ffffff;
            --gradient-1: linear-gradient(135deg, #ff69b4, #b366ff);
            --gradient-2: linear-gradient(135deg, #ffd700, #ff69b4);
            --gradient-3: linear-gradient(135deg, #b366ff, #00d9ff);
            --gradient-4: linear-gradient(180deg, #1a1f3a, #0a0e27);
        }

        /* ============================================
           RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--dark-sky);
            color: var(--text-light);
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 105, 180, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(179, 102, 255, 0.1) 0%, transparent 50%),
                var(--gradient-4);
        }

        /* ============================================
           MAIN CONTAINER & PAGE STRUCTURE
           ============================================ */
        .main-container {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            perspective: 1200px;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transform: translateX(100%) rotateY(90deg);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(0) rotateY(0deg);
            z-index: 10;
        }

        .page.prev {
            transform: translateX(-100%) rotateY(-90deg);
        }

        /* ============================================
           BACKGROUND ANIMATIONS & EFFECTS
           ============================================ */
        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            25% {
                transform: translateY(-20px) translateX(10px);
            }
            50% {
                transform: translateY(-40px) translateX(-10px);
            }
            75% {
                transform: translateY(-20px) translateX(10px);
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            }
            50% {
                box-shadow: 0 0 50px rgba(255, 105, 180, 0.8);
            }
        }

        @keyframes shimmer {
            0% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.3;
            }
        }

        @keyframes rotate-slow {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.3);
            }
            50% {
                transform: scale(1);
            }
        }

        @keyframes glow-pulse {
            0%, 100% {
                text-shadow: 0 0 10px rgba(255, 105, 180, 0.5),
                            0 0 20px rgba(255, 105, 180, 0.3);
            }
            50% {
                text-shadow: 0 0 20px rgba(255, 105, 180, 0.8),
                            0 0 40px rgba(255, 105, 180, 0.5),
                            0 0 60px rgba(179, 102, 255, 0.3);
            }
        }

        @keyframes float-up {
            0% {
                opacity: 0;
                transform: translateY(100px);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px);
            }
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg) scale(1);
            }
            to {
                transform: rotate(360deg) scale(1);
            }
        }

        @keyframes scale-pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        @keyframes wave {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes bounce-in {
            0% {
                opacity: 0;
                transform: scale(0.3) translateY(50px);
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: scale(1) translateY(0px);
            }
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in-down {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes rainbow-shift {
            0% { color: #ff69b4; }
            20% { color: #ffd700; }
            40% { color: #b366ff; }
            60% { color: #00d9ff; }
            80% { color: #ff69b4; }
            100% { color: #ff69b4; }
        }

        /* ============================================
           UTILITY CLASSES
           ============================================ */
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }

        .glow-text {
            animation: glow-pulse 2s ease-in-out infinite;
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        .twinkling {
            animation: twinkle 3s ease-in-out infinite;
        }

        .pulse {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .centered {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============================================
           STARFIELD BACKGROUND
           ============================================ */
        .starfield {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .star.small {
            width: 1px;
            height: 1px;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .star.medium {
            width: 3px;
            height: 3px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
        }

        .star.large {
            width: 5px;
            height: 5px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
        }

        .star.colored {
            background: var(--primary-gold);
            box-shadow: 0 0 15px var(--primary-gold);
        }

        .star.pink {
            background: var(--primary-pink);
            box-shadow: 0 0 15px var(--primary-pink);
        }

        .star.purple {
            background: var(--primary-purple);
            box-shadow: 0 0 15px var(--primary-purple);
        }

        /* ============================================
           PARTICLES & FLOATING EFFECTS
           ============================================ */
        .particle {
            position: absolute;
            pointer-events: none;
        }

        .heart-particle {
            font-size: 24px;
            color: var(--primary-pink);
            animation: float-up 3s ease-out forwards;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
        }

        .sparkle {
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            animation: float-up 2s ease-out forwards;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #ff69b4, #ffd700);
            animation: float-up 3s ease-out forwards;
        }

        /* ============================================
           PAGE 1: OPENING SCENE
           ============================================ */
        .opening-scene {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .universe-center {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 105, 180, 0.4), transparent 60%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            animation: scale-pulse 4s ease-in-out infinite;
            box-shadow: 0 0 100px rgba(255, 105, 180, 0.5),
                       0 0 200px rgba(179, 102, 255, 0.3);
        }

        .universe-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 105, 180, 0.3);
            animation: spin-slow 20s linear infinite;
        }

        .ring-1 {
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-color: rgba(255, 105, 180, 0.2);
        }

        .ring-2 {
            width: 500px;
            height: 500px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-color: rgba(179, 102, 255, 0.15);
            animation: spin-slow 30s linear infinite reverse;
        }

        .ring-3 {
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-color: rgba(255, 215, 0, 0.1);
            animation: spin-slow 40s linear infinite;
        }

        .center-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 105, 180, 0.2), rgba(179, 102, 255, 0.2));
            border: 3px solid var(--primary-pink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            z-index: 5;
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.8),
                       0 0 100px rgba(179, 102, 255, 0.4);
            animation: pulse-glow 2s ease-in-out infinite;
            position: relative;
        }

        .center-image::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--primary-pink), transparent);
            animation: spin-slow 3s linear infinite;
        }

        .title-opening {
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            margin-top: 40px;
            animation: glow-pulse 2s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.8),
                        0 0 60px rgba(179, 102, 255, 0.5);
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-purple), var(--primary-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle-opening {
            font-size: 1.5rem;
            margin-top: 20px;
            color: var(--light-pink);
            animation: fade-in-up 1s ease-out 0.5s both;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            animation: wave 1.5s ease-in-out infinite;
            cursor: pointer;
        }

        .scroll-text {
            font-size: 0.9rem;
            color: var(--light-pink);
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
            margin-bottom: 10px;
            text-align: center;
        }

        .scroll-icon {
            width: 24px;
            height: 40px;
            border: 2px solid var(--primary-pink);
            border-radius: 12px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 8px;
            margin: 0 auto;
        }

        .scroll-icon::before {
            content: '';
            width: 3px;
            height: 8px;
            background: var(--primary-pink);
            border-radius: 2px;
            animation: bounce-in 1.5s ease-in-out infinite;
        }

        /* ============================================
           ORBITAL PARTICLES AROUND CENTER
           ============================================ */
        .orbital-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--primary-gold);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }

        .orbit-1 { animation: spin-slow 15s linear infinite; }
        .orbit-2 { animation: spin-slow 20s linear infinite reverse; }
        .orbit-3 { animation: spin-slow 25s linear infinite; }

        /* ============================================
           PAGE 2: EID GREETING
           ============================================ */
        .eid-greeting {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .eid-container {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .lantern {
            position: relative;
            width: 80px;
            height: 120px;
            margin: 30px auto;
            perspective: 1000px;
        }

        .lantern-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff8c42, #ffd700);
            border-radius: 0 0 20px 20px;
            box-shadow: 0 0 30px rgba(255, 140, 66, 0.8),
                       inset -10px -10px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        .lantern-light {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255, 215, 0, 0.6), transparent);
            border-radius: 0 0 20px 20px;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .lantern-top {
            width: 100%;
            height: 20px;
            background: linear-gradient(180deg, #daa520, #b8860b);
            border-radius: 10px 10px 0 0;
            position: relative;
        }

        .lantern-handle {
            width: 60%;
            height: 30px;
            border: 3px solid #b8860b;
            border-bottom: none;
            border-radius: 50% 50% 0 0;
            margin: -5px auto 0;
            box-shadow: inset 0 -2px 5px rgba(0, 0, 0, 0.3);
        }

        .crescent-moon {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 5px solid var(--primary-gold);
            border-radius: 50%;
            top: 20px;
            right: 100px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8),
                       -20px -20px 40px rgba(255, 215, 0, 0.3);
            animation: float 5s ease-in-out infinite;
            clip-path: polygon(0 0, 100% 0, 100% 30%, 80% 50%, 100% 70%, 100% 100%, 0 100%);
        }

        .lantern-group {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .lantern-group .lantern:nth-child(2) {
            animation-delay: 0.5s;
        }

        .lantern-group .lantern:nth-child(3) {
            animation-delay: 1s;
        }

        .eid-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 40px 0;
            animation: glow-pulse 2s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8),
                        0 0 60px rgba(255, 105, 180, 0.5);
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary-gold), var(--primary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .eid-message {
            font-size: 1.3rem;
            color: var(--light-pink);
            margin: 20px auto;
            max-width: 600px;
            line-height: 2;
            animation: fade-in-up 1.2s ease-out 0.3s both;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
            font-weight: 300;
        }

        .stars-around {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ============================================
           PAGE 3: LOVE STORY TIMELINE
           ============================================ */
        .timeline-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .timeline {
            position: relative;
            width: 100%;
            max-width: 800px;
            z-index: 2;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary-pink), transparent);
            z-index: 1;
        }

        .timeline-item {
            margin-bottom: 50px;
            position: relative;
            opacity: 0;
            animation: fade-in-up 0.8s ease-out forwards;
        }

        .timeline-item:nth-child(1) { animation-delay: 0.1s; }
        .timeline-item:nth-child(2) { animation-delay: 0.2s; }
        .timeline-item:nth-child(3) { animation-delay: 0.3s; }
        .timeline-item:nth-child(4) { animation-delay: 0.4s; }
        .timeline-item:nth-child(5) { animation-delay: 0.5s; }
        .timeline-item:nth-child(6) { animation-delay: 0.6s; }

        .timeline-item:nth-child(odd) {
            padding-right: 52%;
            text-align: right;
        }

        .timeline-item:nth-child(even) {
            padding-left: 52%;
            text-align: left;
        }

        .timeline-dot {
            position: absolute;
            left: 50%;
            top: 0;
            width: 20px;
            height: 20px;
            background: var(--primary-pink);
            border-radius: 50%;
            transform: translateX(-50%);
            z-index: 3;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.8),
                       0 0 40px rgba(255, 105, 180, 0.4);
        }

        .timeline-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 30%, rgba(255, 105, 180, 0.3));
            animation: scale-pulse 2s ease-in-out infinite;
        }

        .timeline-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 105, 180, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .timeline-content:hover {
            background: rgba(255, 105, 180, 0.1);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
            border-color: rgba(255, 105, 180, 0.5);
        }

        .timeline-date {
            font-size: 0.9rem;
            color: var(--primary-gold);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .timeline-title {
            font-size: 1.3rem;
            color: var(--primary-pink);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .timeline-text {
            font-size: 0.95rem;
            color: var(--light-pink);
            line-height: 1.6;
        }

        /* ============================================
           PAGE 4: HEART GALAXY
           ============================================ */
        .heart-galaxy-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .galaxy-title {
            position: absolute;
            top: 40px;
            font-size: 2.5rem;
            z-index: 3;
            animation: glow-pulse 2s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.8);
        }

        .hearts-canvas {
            position: relative;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 105, 180, 0.1), transparent);
            box-shadow: 0 0 80px rgba(255, 105, 180, 0.4),
                       0 0 150px rgba(179, 102, 255, 0.2);
            z-index: 2;
        }

        .heart-item {
            position: absolute;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.6));
        }

        .heart-item:hover {
            font-size: 40px;
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.9));
            animation: heartbeat 0.6s ease-in-out;
        }

        .message-popup {
            position: fixed;
            background: rgba(255, 105, 180, 0.2);
            backdrop-filter: blur(15px);
            border: 2px solid var(--primary-pink);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            z-index: 50;
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            animation: bounce-in 0.5s ease-out forwards;
        }

        .message-popup.show {
            opacity: 1;
        }

        .popup-text {
            font-size: 1.1rem;
            color: var(--light-pink);
            text-align: center;
            line-height: 1.8;
            font-weight: 300;
        }

        .popup-close {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            font-size: 24px;
            color: var(--primary-gold);
            transition: all 0.2s ease;
        }

        .popup-close:hover {
            transform: scale(1.2) rotate(90deg);
        }

        /* ============================================
           PAGE 5: PHOTO GALLERY
           ============================================ */
        .gallery-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            overflow-y: auto;
        }

        .gallery-title {
            font-size: 2.8rem;
            margin-bottom: 60px;
            animation: glow-pulse 2s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.8);
            z-index: 2;
            position: relative;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 25px;
            max-width: 1000px;
            width: 100%;
            z-index: 2;
            position: relative;
        }

        .gallery-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1;

                // Create page content based on type

                else if (rand < 0.8) star.classList.add('medium');
                else star.classList.add('large');
                
                if (rand > 0.85) star.classList.add('colored');
                else if (rand > 0.9) star.classList.add('pink');
                else if (rand > 0.95) star.classList.add('purple');
                
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                
                starfield.appendChild(star);

        function generateConstellation() {
            const constellationData = [
                { x: 100, y: 100 },  // I
                { x: 200, y: 150 },  // M
                { x: 300, y: 100 },  // E

            ];
            
            return constellationData.map((point, i) => `

            `).join('');

        // ============================================
        // PAGE NAVIGATION
        // ============================================
        function nextPage() {
            if (state.currentPage < state.totalPages - 1) {
                changePage(state.currentPage + 1);
            }
        }

        function previousPage() {
            if (state.currentPage > 0) {
                changePage(state.currentPage - 1);
            }
        }

        function changePage(pageIndex) {
            const oldPage = document.getElementById(`page-${pages[state.currentPage]}`);
            const newPage = document.getElementById(`page-${pages[pageIndex]}`);
            
            if (oldPage) {
                oldPage.classList.remove('active');
                if (pageIndex > state.currentPage) {
                    oldPage.classList.remove('prev');
                } else {
                    oldPage.classList.add('prev');
                }
            }
            
            if (newPage) {
                newPage.classList.add('active');
                newPage.classList.remove('prev');
            }
            
            state.currentPage = pageIndex;
            updatePageIndicator();
            
            // Initialize starfield for new page
            createPageStarfield(pages[pageIndex]);
            
            // Trigger page-specific animations
            triggerPageAnimation(pages[pageIndex]);
        }

        function createPageStarfield(pageName) {
            const starfieldId = `starfield-${pageName}`;
            const starfield = document.getElementById(starfieldId);
            if (!starfield || starfield.children.length > 0) return;
            
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                const rand = Math.random();
                if (rand < 0.5) star.classList.add('small');
                else if (rand < 0.8) star.classList.add('medium');
                else star.classList.add('large');
                
                if (rand > 0.85) star.classList.add('colored');
                else if (rand > 0.9) star.classList.add('pink');
                
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                
                starfield.appendChild(star);
            }
        }

        function updatePageIndicator() {
            const indicator = document.getElementById('page-indicator');
            if (indicator) {

        function triggerPageAnimation(pageName) {
            switch(pageName) {
                case 'fireworks':
                    triggerFireworks();
                    break;
                case 'final':
                    triggerHeartRain();
                    break;
            }
        }

        // ============================================
        // PARTICLE EFFECTS
        // ============================================
        function triggerHeartRain() {
            const container = document.getElementById('heart-rain');
            if (!container) return;
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'falling-heart';
                    heart.textContent = '❤️';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animation = `float-up ${3 + Math.random() * 2}s ease-out forwards`;
                    container.appendChild(heart);
                }, i * 100);
            }
        }

        function triggerFireworks() {
            const canvas = document.getElementById('fireworks-canvas');
            if (!canvas) return;
            
            canvas.innerHTML = '';
            
            for (let burst = 0; burst < 8; burst++) {
                setTimeout(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * (window.innerHeight * 0.7);
                    
                    for (let i = 0; i < 20; i++) {
                        const particle = document.createElement('div');
                        particle.className = 'firework-particle';
                        particle.style.left = x + 'px';
                        particle.style.top = y + 'px';
                        particle.style.width = (4 + Math.random() * 4) + 'px';
                        particle.style.height = particle.style.width;
                        
                        const colors = ['var(--primary-pink)', 'var(--primary-gold)', 'var(--primary-purple)'];
                        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                        
                        const angle = (i / 20) * Math.PI * 2;
                        const velocity = 5 + Math.random() * 10;
                        const vx = Math.cos(angle) * velocity;
                        const vy = Math.sin(angle) * velocity;
                        
                        particle.style.animation = `burst ${2 + Math.random() * 1}s ease-out forwards`;
                        
                        canvas.appendChild(particle);
                        
                        animateParticle(particle, vx, vy);
                    }
                }, burst * 600);
            }
        }

        function animateParticle(el, vx, vy) {
            let x = parseFloat(el.style.left);
            let y = parseFloat(el.style.top);
            let opacity = 1;
            
            const animate = () => {
                x += vx;
                y += vy;
                vy += 0.3; // gravity
                opacity -= 0.02;
                
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.opacity = opacity;
                
                if (opacity > 0) {
                    requestAnimationFrame(animate);
                }
            };
            
            animate();
        }

        // ============================================
        // ANIMATION TRIGGERS
        // ============================================
        function initializePageAnimations() {
            // Add animation setup for first page
            triggerPageAnimation('opening');
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        function addEventListeners() {
            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') nextPage();
                if (e.key === 'ArrowLeft') previousPage();
            });
            
            // Scroll navigation
            let scrollTimeout;
            document.addEventListener('wheel', (e) => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    if (e.deltaY > 0) nextPage();
                    else if (e.deltaY < 0) previousPage();
                }, 100);
            });
            
            // Close popups on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeHeartMessage();
                    closeSecret();
                }
            });
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            initializeDOM();
            
            // Add CSS for burst animation
            const style = document.createElement('style');
            style.textContent = `
                @keyframes burst {
                    to {
                        opacity: 0;
                        transform: translate(0, 0) scale(0);
                    }
                }
            `;
            document.head.appendChild(style);
        });

    </script>
</head>
<body>
    <div class="main-container" id="main-container"></div>
</body>
</html>
