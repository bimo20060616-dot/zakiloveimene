<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى إيمان.. لغز تعابير الوجوه</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #ffb3c1;
            --background-color: #fff0f3;
            --text-color: #4a4a4a;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--background-color), #f0e6ff);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin: 40px 0;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            color: #666;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.15);
        }

        .image-container {
            width: 100%;
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .image-placeholder {
            position: absolute;
            color: #888;
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.8);
            padding: 5px 15px;
            border-radius: 10px;
            z-index: 1;
        }

        .content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .question {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .reveal-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        .reveal-btn:hover {
            background-color: #ff758f;
        }

        .answer-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            background-color: #fff5f6;
            border-right: 4px solid var(--primary-color);
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .expected-ans {
            font-style: italic;
            color: #777;
            margin-bottom: 8px;
            font-size: 0.95rem;
            }

        .real-ans {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin: 40px 0 20px 0;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>ما سر هذه التعابير يا إيمان؟</h1>
        <p>اضغطي على الزر أسفل كل صورة لاكتشاف السبب الحقيقي وراء ردود أفعالهم المختلفة...</p>
    </header>

    <div class="gallery-container" id="gallery"></div>

    <footer>
        <p>صنع بكل شوق</p>
    </footer>

    <script>
        const stories = [
            { id: 1, q: "لماذا هذا الشخص يفكر بعمق يا إيمان؟", expected: "لأنه يحاول حل مسألة رياضية معقدة.", real: "خطأ! إنه يضع خطة استراتيجية عبقرية لإقناعك بالتراجع عن قرارك وإرسال الصور فورا" },
            { id: 2, q: "لماذا هذا الشخص غاضب ومنفعل يا إيمان؟", expected: "لأن شخصاً ما أزعجه وتسبب في ضيقه.", real: "خطأ! إنه غاضب من الهاتف ومن الإنترنت ومن لعبة الشطرنج ومن كل شيء تسبب في تأخير أو منع وصول صورك إليه." },
            { id: 3, q: "لماذا هذا الشخص محتار ويهز رأسه يا إيمان؟", expected: "لأنه أضاع شيئاً ثميناً ولا يجده.", real: "خطأ! إنه محتار ومذهول كيف يمكن لجمال وجهك وجسمك أن يغيب عن يومه هكذا دون أي سبب مقنع!" },
            { id: 4, q: "لماذا هذا الشخص يبدو مرهقاً وناعساً يا إيمان؟", expected: "لأنه عمل لساعات طويلة دون أي راحة.", real: "خطأ! إنه متعب من كثرة تحديث محادثتكِ كل دقيقة، بانتظار أن يظهر هذا الإشعار السحري الذي يحتوي على صورك." },
            { id: 5, q: "لماذا هذا الشخص يحتفل ويرقص يا إيمان؟", expected: "لأن فريقه المفضل فاز بالمباراة الكبرى.", real: "خطأ! إنه يحتفل مسبقاً باللحظة التي سيرق فيها قلبك الطيب وتنهين هذا الإضراب وترسلين صورك." },
            { id: 6, q: "لماذا هذا الشخص يطلب السكوت ويضع إصبعه على فمه يا إيمان؟", expected: "لأنه يريد النوم والراحة في هدوء تام.", real: "خطأ! إنه يطلب من العالم الصمت لكي يسمع رنين الهاتف بوضوح لو قررت فجأة ارسال الصور." },
            { id: 7, q: "لماذا هاد الشخص يبدو كعبقري يا إيمان؟", expected: "لأنه يكتب كوداً برمجياً معقداً للغاية.", real: "خطأ! إنه يحاول اختراع خوارزمية جديدة لفك تشفير هذا القرار القاسي وإقناعك بإرسال الصور." },
            { id: 8, q: "لماذا هذا الشخص يركض بسرعة جنونية يا إيمان؟", expected: "لأنه متأخر عن موعد الحافلة أو العمل.", real: "خطأ! إنه يركض نحو الشاحن لكي لا ينطفئ الهاتف لو حن قلبك فجأة وقررت إرسال صوركِ." },
            { id: 9, q: "لماذا هذا الشخص يبتسم ابتسامة خبيثة يا إيمان؟", expected: "لأنه تذكر موقف مضحك قديم.", real: "خطأ! بيبتسم بخبث وهو يفكر في الطريقة اللتي يستعيد بيها صور جسمكِ المغري." },
            { id: 10, q: "لماذا هذا الشخص يغمض عينيه بقوة يا إيمان؟", expected: "لأنه يحاول يتذكر شيئاً مهم.", real: "خطأ! مغمض عينيه بقوة عشان يرسم جسمك العاري في خياله بتفاصيل أكثر." },
            { id: 11, q: "لماذا هذا الشخص يمد لسانه خارج فمه يا إيمان؟", expected: "لأنه يلعب مع أصدقائه.", real: "خطأ! لسانه خارج من كتر ما هو متخيل طعم بشرتك وهو محروم منها." }
        ];

        const gallery = document.getElementById('gallery');

        stories.forEach(story => {
            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <div class="image-container">
                    <img src="waa1/${story.id}.jpg" alt="صورة ${story.id}" onerror="this.style.opacity='0';">
                </div>
                <div class="content">
                    <div class="question">${story.q}</div>
                    <button class="reveal-btn" onclick="revealAnswer(this)">اكتشفي الإجابة</button>
                    <div class="answer-box">
                        <div class="expected-ans">إجابتكِ المتوقعة: "${story.expected}"</div>
                        <div class="real-ans">${story.real}</div>
                    </div>
                </div>
            `;
            gallery.appendChild(card);
        });

        function revealAnswer(button) {
            const answerBox = button.nextElementSibling;
            if (answerBox.style.display === 'block') {
                answerBox.style.display = 'none';
                button.textContent = 'اكتشفي الإجابة';
            } else {
                answerBox.style.display = 'block';
                button.textContent = 'إغلاق الإجابة';
            }
        }
    </script>
</body>
</html>
