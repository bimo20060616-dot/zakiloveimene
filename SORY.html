<html lang="en">

    <title>I'm Sorry Imene - A Digital Apology</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================
           CSS VARIABLES & ROOT STYLING
           ======================================== */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Color Palette - Romantic & Cinematic */
            --primary-dark: #0f0a1a;
            --primary-light: #1a1428;
            --accent-pink: #e94b7f;
            --accent-purple: #9d4edd;
            --accent-gold: #ffd60a;
            --accent-rose: #ff006e;
            --soft-cream: #f8f5f0;
            --glow-pink: #ff1493;
            --glow-purple: #b537f2;
            
            /* Gradients */
            --gradient-hero: linear-gradient(135deg, #0f0a1a 0%, #1a0f2e 25%, #2d1b4e 50%, #1a0f2e 75%, #0f0a1a 100%);
            --gradient-card: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
            
            /* Typography */
            --font-display: 'Playfair Display', serif;
            --font-elegant: 'Cormorant Garamond', serif;
            --font-body: 'Poppins', sans-serif;
            
            /* Spacing */
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 3rem;
            --spacing-xl: 4rem;
            --spacing-2xl: 6rem;
        }

        /* ========================================
           GLOBAL STYLES
           ======================================== */
        
        body {
            font-family: var(--font-body);
            background: var(--primary-dark);
            color: var(--soft-cream);
            overflow-x: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="6" fill="%23ff1493"/></svg>'), auto;
        }

        html {
            scroll-behavior: smooth;
        }

        /* ========================================
           HERO SECTION
           ======================================== */
        
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--gradient-hero);
            overflow: hidden;
            padding: var(--spacing-lg);
        }

        /* Animated Background Elements */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 22, 95, 0.08) 0%, transparent 50%);
            animation: gradientShift 8s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 0.9;
            }
        }

        /* Hero Content */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInUp 1.2s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main Title */
        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(3.5rem, 10vw, 8rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: var(--spacing-md);
            background: linear-gradient(135deg, 
                var(--soft-cream) 0%, 
                var(--accent-gold) 40%, 
                var(--accent-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 20, 147, 0.3);
            letter-spacing: -2px;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 20, 147, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(157, 78, 221, 0.6));
            }
        }

        /* Subtitle */
        .hero-subtitle {
            font-family: var(--font-elegant);
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 300;
            color: rgba(248, 245, 240, 0.8);
            margin-bottom: var(--spacing-2xl);
            letter-spacing: 1px;
            animation: fadeInUp 1.2s ease-out 0.6s both;
        }

        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            animation: fadeInUp 1s ease-out 1.2s both;
        }

        .scroll-arrow {
            width: 30px;
            height: 50px;
            border: 2px solid rgba(248, 245, 240, 0.5);
            border-radius: 15px;
            position: relative;
            animation: scrollBounce 2s infinite;
        }

        .scroll-arrow::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--accent-pink);
            border-radius: 50%;
            transform: translateX(-50%);
            animation: scrollMove 2s infinite;
        }

        @keyframes scrollBounce {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes scrollMove {
            0% {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) translateY(20px);
                opacity: 0;
            }
        }

        /* ========================================
           PARTICLE & FLOATING ELEMENTS
           ======================================== */
        
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0;
            animation: floatUp 3s ease-in forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(0);
                opacity: 0;
            }
        }

        .particle {
            position: absolute;
            pointer-events: none;
        }

        .particle-dot {
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, var(--accent-pink), transparent);
            border-radius: 50%;
            opacity: 0.6;
            animation: particleFloat 8s infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translate(0, 0);
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }

        /* ========================================
           LANGUAGES SECTION
           ======================================== */
        
        .languages {
            position: relative;
            min-height: 100vh;
            padding: var(--spacing-2xl) var(--spacing-lg);
            background: linear-gradient(180deg, var(--primary-dark) 0%, #1a0f2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .languages::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        .languages::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 22, 95, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(30px);
            }
        }

        .languages-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
            position: relative;
            z-index: 10;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .languages-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            margin-bottom: var(--spacing-md);
            color: var(--soft-cream);
        }

        .languages-subtitle {
            font-family: var(--font-elegant);
            font-size: 1.1rem;
            color: rgba(248, 245, 240, 0.7);
            font-weight: 300;
        }

        /* Language Cards Grid */
        .languages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-lg);
            max-width: 1400px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        /* Language Card */
        .language-card {
            background: var(--gradient-card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: var(--spacing-lg);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: cardAppear 0.6s ease-out backwards;
            position: relative;
            overflow: hidden;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .language-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--glow-pink), transparent);
            opacity: 0;
            transition: all 0.4s ease-out;
            pointer-events: none;
        }

        .language-card:hover::before {
            opacity: 0.5;
            top: -30%;
            right: -30%;
        }

        .language-card:hover {
            transform: translateY(-15px) scale(1.05);
            border-color: rgba(255, 20, 147, 0.5);
            box-shadow: 0 25px 50px rgba(157, 78, 221, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .card-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .card-language {
            font-family: var(--font-elegant);
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: var(--spacing-sm);
            line-height: 1.6;
            color: var(--accent-gold);
        }

        .card-country {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-sm);
        }

        .card-message {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: rgba(248, 245, 240, 0.8);
            font-style: italic;
            opacity: 0;
            transition: opacity 0.4s ease-out;
            margin-top: var(--spacing-sm);
        }

        .language-card:hover .card-message {
            opacity: 1;
        }

           ======================================== */
        
        .final-section {
            position: relative;
            min-height: 100vh;
            padding: var(--spacing-2xl) var(--spacing-lg);
            background: linear-gradient(180deg, #1a0f2e 0%, var(--primary-dark) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 5;
        }

        .final-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255, 20, 147, 0.05) 0%, transparent 70%);
            pointer-events: none;
            animation: breathe 4s ease-in-out infinite;
        }

            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.7;
            }
        }

        .final-content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            animation: fadeInUp 1.2s ease-out;
        }

        .final-message {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: var(--spacing-2xl);
            color: var(--soft-cream);
        }

        .final-message .highlight {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Forgive Button */
        .forgive-btn {
            position: relative;
            padding: var(--spacing-md) var(--spacing-xl);
            font-family: var(--font-elegant);
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-rose));
            border: 2px solid var(--accent-pink);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.4);
            overflow: hidden;
            animation: buttonFloat 2s ease-in-out infinite;
        }

        @keyframes buttonFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .forgive-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease-out;
        }

        .forgive-btn:hover::before {
            left: 100%;
        }

        .forgive-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(255, 20, 147, 0.6),
                        0 0 30px rgba(157, 78, 221, 0.4);
            background: linear-gradient(135deg, var(--accent-rose), var(--accent-pink));
        }

        .forgive-btn:active {
            transform: scale(0.98);
        }

        /* Success Message */
        .success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--accent-pink);
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            animation: successPop 2s ease-out forwards;
            text-align: center;
            line-height: 1.4;
        }

        @keyframes successPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* ========================================
           MUSIC BUTTON
           ======================================== */
        
        .music-btn {
            position: fixed;
            bottom: var(--spacing-lg);
            right: var(--spacing-lg);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease-out;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 25px rgba(255, 20, 147, 0.4);
        }

        .music-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 12px 35px rgba(255, 20, 147, 0.6);
        }

        .music-btn.playing::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--accent-pink);
            border-radius: 50%;
            animation: pulse 1.5s ease-out infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        /* ========================================
           RESPONSIVE DESIGN
           ======================================== */
        
        @media (max-width: 768px) {
            .languages-grid {
                grid-template-columns: 1fr;
                gap: var(--spacing-md);
            }

            .music-btn {
                bottom: var(--spacing-md);
                right: var(--spacing-md);
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .hero {
                padding: var(--spacing-md);
            }

            .languages {
                padding: var(--spacing-xl) var(--spacing-md);
            }

            .final-section {
                padding: var(--spacing-xl) var(--spacing-md);
            }

            .scroll-indicator {
                display: none;
            }
        }

        /* ========================================
           UTILITY & ANIMATIONS
           ======================================== */
        
        .fade-in {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .typing-animation {
            display: inline-block;
            border-right: 3px solid var(--accent-pink);
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 50% {
                border-right-color: var(--accent-pink);
            }
            51%, 100% {
                border-right-color: transparent;
            }
        }

        /* ========================================
           CONFETTI & EXPLOSION EFFECTS
           ======================================== */
        
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 2rem;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translate(var(--tx), 0) rotateZ(var(--rotation)) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), 100vh) rotateZ(calc(var(--rotation) + 360deg)) scale(0);
            }
        }

        .confetti.falling {
            animation: confettiFall 3s ease-in forwards;
        }

        /* ========================================
           ACCESSIBILITY
           ======================================== */
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Smooth scrolling without jarring transitions */
        .section-container {
            scroll-snap-align: start;
        }

        /**
         * Creates and animates stars in the background
         */
        function createStars() {
            const starsContainer = document.getElementById('starsContainer');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        /**
         * Creates floating particles in the hero section
         */
        function createParticles() {
            const heroSection = document.getElementById('heroSection');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';

                const dot = document.createElement('div');
                dot.className = 'particle-dot';

                const tx = (Math.random() - 0.5) * 200;
                const ty = (Math.random() - 0.5) * 200 - 100;
                const duration = Math.random() * 4 + 6;

                dot.style.setProperty('--tx', tx + 'px');
                dot.style.setProperty('--ty', ty + 'px');
                dot.style.animationDuration = duration + 's';
                dot.style.animationDelay = Math.random() * 2 + 's';

                particle.appendChild(dot);
                heroSection.appendChild(particle);
            }
        }

        /**
         * Renders language cards from data
         */
        function renderLanguageCards() {
            const grid = document.getElementById('languagesGrid');
            grid.innerHTML = '';

            languages.forEach((lang, index) => {
                const card = document.createElement('div');
                card.className = 'language-card';
                card.innerHTML = `
                    <div class="card-content">
                        <div class="card-language">${lang.message}</div>
                        <div class="card-country">${lang.flag}</div>
                        <div class="card-message">${lang.name}</div>
                    </div>
                `;

                // Add hover effect with heart particles
                card.addEventListener('mouseenter', () => {
                    createHeartParticles(card);
                });

                grid.appendChild(card);
            });
        }

        /**
         * Creates floating hearts when hovering over cards
         */
        function createHeartParticles(element) {
            const rect = element.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            for (let i = 0; i < 3; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = '❤️';
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                heart.style.animationDuration = (2 + Math.random() * 1) + 's';

                const angle = (Math.PI * 2 * i) / 3;
                const velocity = 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity - 50;

                heart.style.setProperty('--tx', tx + 'px');
                heart.style.setProperty('--ty', ty + 'px');

                document.body.appendChild(heart);

                setTimeout(() => heart.remove(), 2000 + Math.random() * 1000);
            }
        }

        /**
         * Creates confetti explosion effect
         */
        function createConfettiExplosion() {
            const confettiTypes = ['❤️', '💜', '✨', '🌸', '💖'];
            const confettiCount = 50;

            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti falling';
                confetti.textContent = confettiTypes[Math.floor(Math.random() * confettiTypes.length)];

                const startX = Math.random() * window.innerWidth;
                const startY = window.innerHeight / 2;

                confetti.style.left = startX + 'px';
                confetti.style.top = startY + 'px';
                confetti.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';

                const tx = (Math.random() - 0.5) * 400;
                const rotation = Math.random() * 360;

                confetti.style.setProperty('--tx', tx + 'px');
                confetti.style.setProperty('--rotation', rotation + 'deg');
                confetti.style.animationDuration = (3 + Math.random() * 1) + 's';

                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 4000);
            }
        }

        /**
         * Shows success message with animation
         */
        function showSuccessMessage() {
            const messages = [
                "Thank you for reading my apology.",
                "Your forgiveness means everything.",
                "You are loved, Imene.",
                "From the bottom of my heart... 💖"
            ];

            const successMessage = document.getElementById('successMessage');
            successMessage.textContent = messages[Math.floor(Math.random() * messages.length)];
            successMessage.style.animation = 'none';

            // Trigger reflow to restart animation
            void successMessage.offsetWidth;
            successMessage.style.animation = 'successPop 2s ease-out forwards';
        }

        /**
         * Observes when elements come into view
         */
        function setupIntersectionObserver() {
            const options = {
                threshold: 0.3,
                rootMargin: '0px 0px -100px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                    }
                });
            }, options);

            const sections = document.querySelectorAll('.languages, .final-section');
            sections.forEach(section => observer.observe(section));
        }

        /**
         * Mouse trail effect with glowing particles
         */
        function setupMouseTrail() {
            let mouseX = 0;
            let mouseY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;

                // Occasionally create small glow particles
                if (Math.random() > 0.8) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = mouseX + 'px';
                    particle.style.top = mouseY + 'px';

                    const dot = document.createElement('div');
                    dot.className = 'particle-dot';
                    dot.style.width = '2px';
                    dot.style.height = '2px';
                    dot.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
                    dot.style.setProperty('--ty', (Math.random() - 0.5) * 100 + 'px');
                    dot.style.animationDuration = '1.5s';

                    particle.appendChild(dot);
                    document.body.appendChild(particle);

                    setTimeout(() => particle.remove(), 1500);
                }
            });
        }

        /* ========================================
           MUSIC FUNCTIONALITY
           ======================================== */

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let isPlaying = false;
        let oscillator = null;
        let gainNode = null;

        /**
         * Creates a gentle ambient tone using Web Audio API
         */
        function playAmbientMusic() {
            if (isPlaying) return;

            gainNode = audioContext.createGain();
            gainNode.connect(audioContext.destination);
            gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);

            // Create a gentle, romantic tone
            oscillator = audioContext.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(264, audioContext.currentTime); // C4 note
            oscillator.connect(gainNode);
            oscillator.start();

            // Add gentle frequency modulation
            const lfo = audioContext.createOscillator();
            lfo.frequency.setValueAtTime(0.5, audioContext.currentTime);
            const lfoGain = audioContext.createGain();
            lfoGain.gain.setValueAtTime(10, audioContext.currentTime);
            lfo.connect(lfoGain);
            lfoGain.connect(oscillator.frequency);
            lfo.start();

            isPlaying = true;
            document.getElementById('musicBtn').classList.add('playing');
        }

        /**
         * Stops the ambient music
         */
        function stopAmbientMusic() {
            if (!isPlaying) return;

            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1);
            setTimeout(() => {
                oscillator.stop();
                isPlaying = false;
                document.getElementById('musicBtn').classList.remove('playing');
            }, 1000);
        }

        /**
         * Toggles music on/off
         */
        function toggleMusic() {
            if (isPlaying) {
                stopAmbientMusic();
            } else {
                playAmbientMusic();
            }
        }

        /* ========================================
           EVENT LISTENERS
           ======================================== */

        document.addEventListener('DOMContentLoaded', () => {
            // Initialize all components
            createStars();
            createParticles();
            renderLanguageCards();
            setupIntersectionObserver();
            setupMouseTrail();

            // Music button
            document.getElementById('musicBtn').addEventListener('click', toggleMusic);

            // Forgive button - main interaction
            document.getElementById('forgiveBtn').addEventListener('click', () => {
                createConfettiExplosion();
                showSuccessMessage();

                // Create multiple heart bursts
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createHeartParticles(document.getElementById('forgiveBtn'));
                    }, i * 200);
                }
            });

            // Smooth scroll for scroll indicator
            document.querySelector('.scroll-arrow')?.addEventListener('click', () => {
                document.getElementById('languagesSection').scrollIntoView({ behavior: 'smooth' });
            });
        });

        /**
         * Create floating hearts on random intervals in the background
         */
        function startRandomHearts() {
            setInterval(() => {
                if (Math.random() > 0.7) {
                    const heart = document.createElement('div');
                    heart.className = 'floating-heart';
                    heart.textContent = '❤️';
                    heart.style.left = Math.random() * window.innerWidth + 'px';
                    heart.style.top = window.innerHeight + 'px';
                    heart.style.opacity = '0.3';

                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 4000);
                }
            }, 2000);
        }

        // Start random hearts after a delay
        setTimeout(startRandomHearts, 3000);

        /**
         * Add scroll-based animations for additional immersion
         */
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;

            // Parallax effect for background gradients
            document.querySelectorAll('.languages, .final-section').forEach((section, index) => {
                const offset = scrolled * 0.5;
                section.style.backgroundPosition = `0 ${offset}px`;
            });

            // Fade in language cards as they come into view
            document.querySelectorAll('.language-card').forEach((card) => {
                const rect = card.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.8) {
                    card.style.opacity = '1';
                }
            });
        });

        /**
         * Responsive design adjustments
         */
        function handleResize() {
            if (window.innerWidth < 768) {
                // Remove particles on mobile for better performance
                document.querySelectorAll('.particle').forEach(p => p.remove());
            }
        }

        window.addEventListener('resize', handleResize);
        handleResize();

        /* ========================================
           KEYBOARD ACCESSIBILITY
           ======================================== */

        document.addEventListener('keydown', (e) => {
            // Spacebar to toggle music
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                toggleMusic();
            }

            // Enter to forgive
            if (e.code === 'Enter' && document.activeElement === document.getElementById('forgiveBtn')) {
                document.getElementById('forgiveBtn').click();
            }
        });

        /**
         * Mobile touch optimizations
         */
        document.addEventListener('touchmove', (e) => {
            // Prevent zoom on double tap
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
