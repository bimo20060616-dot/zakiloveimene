    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e81cff;
            --secondary: #40c9ff;
            --dark-bg: #0f0c29;
            --mid-bg: #302b63;
            --light-bg: #24243e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom cursor */
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(to right, var(--dark-bg), var(--mid-bg), var(--light-bg));
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary);
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(232, 28, 255, 0.5);
            transition: width 0.2s, height 0.2s, border-color 0.2s;
        }

        /* Floating Hearts Background */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -100px;
            font-size: 20px;
            color: rgba(232, 28, 255, 0.3);
            animation: floatUp 10s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        /* Header Section */
        header {
            text-align: center;
            padding: 6rem 2rem 3rem;
            position: relative;
        }

        h1 {
            font-family: 'Amiri', serif;
            font-size: 4.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 10px 30px rgba(255, 117, 140, 0.3);
            animation: fadeInDown 1.5s ease-out;
        }

        .subtitle {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
            font-weight: 300;
            animation: fadeInUp 1.5s ease-out 0.5s both;
        }

        /* Gallery Layout */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            column-count: 3;
            column-gap: 2rem;
            animation: fadeIn 2s ease-out 1s both;
        }

        .gallery-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            break-inside: avoid;
            margin-bottom: 2rem;
            display: block;
        }

        .gallery-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,0.1), rgba(255,255,255,0));
            transform: skewX(-25deg);
            animation: shine 6s infinite;
            z-index: 2;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-item:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(232, 28, 255, 0.3);
            border-color: rgba(232, 28, 255, 0.4);
        }

        .gallery-item:hover img {
            transform: scale(1.1) rotate(2deg);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2rem;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay i {
            color: #ff7eb3;
            font-size: 2rem;
            margin-bottom: 10px;
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-item:hover .overlay i {
            transform: translateY(0);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(232, 28, 255, 0.3);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lightbox.active img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
        }

        .lightbox-close:hover {
            color: #ff7eb3;
            transform: rotate(90deg);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Romantic Audio Button */
        .audio-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .audio-btn:hover {
            background: rgba(232, 28, 255, 0.2);
            transform: scale(1.1);
            border-color: rgba(232, 28, 255, 0.5);
        }

        .audio-btn.playing i {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #ff7eb3; }
            100% { transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .gallery-container { column-count: 2; }
        }
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .subtitle { font-size: 1.2rem; padding: 0 1rem; }
            .gallery-container { column-count: 1; column-gap: 1rem; padding: 1rem; }
            .gallery-item { margin-bottom: 1rem; }
        }
    </style>
</head>

    <script>
        // Custom Cursor Logic
        const dot = document.getElementById('cursor-dot');
        const outline = document.getElementById('cursor-outline');

        window.addEventListener('mousemove', function(e) {
            const posX = e.clientX;
            const posY = e.clientY;

            dot.style.left = `${posX}px`;
            dot.style.top = `${posY}px`;

            // Adding a slight delay to the outline for a smooth effect
            setTimeout(() => {
                outline.style.left = `${posX}px`;
                outline.style.top = `${posY}px`;
            }, 50);
        });

        // Add hover effects for custom cursor
        const interactiveElements = document.querySelectorAll('a, .gallery-item, .lightbox-close, .audio-btn');
        
        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                outline.style.transform = 'translate(-50%, -50%) scale(1.5)';
                outline.style.borderColor = '#ff7eb3';
                outline.style.backgroundColor = 'rgba(255, 126, 179, 0.1)';
            });
            el.addEventListener('mouseleave', () => {
                outline.style.transform = 'translate(-50%, -50%) scale(1)';
                outline.style.borderColor = 'rgba(232, 28, 255, 0.5)';
                outline.style.backgroundColor = 'transparent';
            });
        });

        // Floating Hearts Logic
        function createHeart() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('i');
            heart.classList.add('fas', 'fa-heart', 'heart');
            
            // Random properties
            const size = Math.random() * 20 + 10; // 10px to 30px
            const left = Math.random() * 100; // 0% to 100%
            const duration = Math.random() * 10 + 5; // 5s to 15s
            
            heart.style.fontSize = `${size}px`;
            heart.style.left = `${left}%`;
            heart.style.animationDuration = `${duration}s`;
            
            container.appendChild(heart);
            
            // Remove after animation completes
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Create hearts periodically
        setInterval(createHeart, 800);

        // Lightbox Logic
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(imageSrc) {
            lightboxImg.src = imageSrc;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        }

        function closeLightbox(e, force = false) {
            if (force || e.target === lightbox) {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto'; // Restore scrolling
            }
        }

        // Music Logic
        const audio = document.getElementById('bg-music');
        const audioBtn = document.getElementById('audio-btn');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                audioBtn.classList.remove('playing');
                audioBtn.innerHTML = '<i class="fas fa-music"></i>';
            } else {
                // Try to play
                let playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        audioBtn.classList.add('playing');
                        audioBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                    }).catch(error => {
                        console.log("Audio playback failed: ", error);
                    });
                }
            }
            isPlaying = !isPlaying;
        }

        // Try to play audio automatically on user interaction
        document.body.addEventListener('click', function initAudio() {
            if (!isPlaying) {
                toggleMusic();
            }
            document.body.removeEventListener('click', initAudio);
        }, { once: true });
    </script>
