<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaki's Diaries | Elite Journal</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg-deep: #02040a;
            --bg-midnight: #0a0f1f;
            --bg-royal: #111a35;
            --accent-glow: #2563eb;
            --accent-glow-subtle: rgba(37, 99, 235, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-date: #60a5fa;
            --font-sans: 'Outfit', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-royal);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-glow);
        }

        /* Background Effects */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 0%, var(--bg-midnight) 0%, var(--bg-deep) 100%);
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: rgba(37, 99, 235, 0.15);
            top: -200px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(15, 32, 75, 0.6);
            bottom: -100px;
            right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, -50px) scale(0.9); }
        }

        /* Header */
        .header {
            padding: 8vh 20px 4vh;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .header-title {
            font-family: var(--font-sans);
            font-weight: 800;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .header-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
        }

        .header-subtitle {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            margin-top: 1.5rem;
        }

        /* Dashboard Layout */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 5%;
            position: relative;
            z-index: 10;
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 40vh;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 2px solid var(--accent-glow-subtle);
            border-top: 2px solid var(--accent-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Grid */
        .entries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2.5rem;
            align-items: start;
        }

        /* Glassmorphism Cards */
        .card {
            background: rgba(17, 26, 48, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 20px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(30px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transition: left 0.7s ease;
            z-index: 1;
            pointer-events: none;
        }

        .card:hover {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 15px 40px -5px rgba(0, 0, 0, 0.6), 
                        0 0 25px rgba(37, 99, 235, 0.2), 
                        inset 0 0 15px rgba(37, 99, 235, 0.1);
            transform: translateY(-8px);
            background: rgba(21, 32, 60, 0.4);
        }

        .card:hover::before {
            left: 100%;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 2;
        }

        .card-date {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-date);
            font-weight: 500;
        }

        .card-icon {
            color: rgba(96, 165, 250, 0.5);
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .card:hover .card-icon {
            color: var(--text-date);
        }

        .card-title {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
            line-height: 1.3;
            position: relative;
            z-index: 2;
        }

        .card-preview {
            font-family: var(--font-sans);
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.7;
            font-weight: 300;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        /* Modal / Detail View */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(2, 4, 10, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(17, 26, 48, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 24px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            padding: 3rem;
            position: relative;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 40px rgba(37, 99, 235, 0.15);
            transform: scale(0.95) translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            scrollbar-width: thin;
            scrollbar-color: var(--bg-royal) transparent;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-close:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        .modal-date {
            font-family: var(--font-sans);
            color: var(--text-date);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: block;
        }

        .modal-title {
            font-family: var(--font-serif);
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 2rem;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .modal-body {
            font-family: var(--font-sans);
            font-size: 1.1rem;
            color: #cbd5e1;
            line-height: 1.8;
            font-weight: 300;
        }

        .modal-body p {
            margin-bottom: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .entries-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .card {
                padding: 2rem;
            }
            .modal-content {
                padding: 2rem 1.5rem;
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient Background Effects -->
    <div class="ambient-bg">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <h1 class="header-title">Zaki Words</h1>
        <p class="header-subtitle">Note taw3i hahahahahh</p>
    </header>

    <!-- Main Dashboard -->
    <main class="dashboard" id="dashboard">
        <div class="loader" id="loader">
            <div class="spinner"></div>
        </div>
        
        <div class="entries-grid" id="entries-grid">
            <!-- Cards will be injected dynamically via JS -->
        </div>
    </main>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">
                <i class="fas fa-times"></i>
            </button>
            <span class="modal-date" id="modal-date"></span>
            <h2 class="modal-title" id="modal-title"></h2>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        // Sheety API Configuration
        // Replace this URL with the actual Sheety API endpoint for Zaki's Diaries
        const SHEETY_API_URL = "https://api.sheety.co/44a86bb7b3501610f0adec2fb9e8767a/zaki/sheet1";

        // Array for fallback removed to ensure real data from Google Sheet is displayed.
        // DOM Elements
        const grid = document.getElementById("entries-grid");
        const loader = document.getElementById("loader");
        const modal = document.getElementById("modal");
        const modalCloseBtn = document.getElementById("modal-close");
        const modalDate = document.getElementById("modal-date");
        const modalTitle = document.getElementById("modal-title");
        const modalBody = document.getElementById("modal-body");

        // Initialization
        async function init() {
            // Animate Header
            gsap.from(".header-title", {
                y: -50,
                opacity: 0,
                duration: 1.2,
                ease: "power4.out"
            });
            gsap.from(".header-subtitle", {
                y: 20,
                opacity: 0,
                duration: 1,
                delay: 0.4,
                ease: "power3.out"
            });

            await loadData();
        }

        // Fetch Data
        async function loadData() {
            try {
                // Attempt to fetch from Sheety
                const response = await fetch(SHEETY_API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                // Extract sheet data (Sheety usually wraps it in a property named after the sheet)
                const sheetKey = Object.keys(data)[0];
                const dataToRender = data[sheetKey];
                
                renderEntries(dataToRender || []);
            } catch (error) {
                console.error("Error fetching data:", error);
                renderError();
            }
        }

        function renderError() {
            loader.style.display = 'none';
            grid.innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; color: var(--text-secondary); padding: 3rem;">
                    <i class="fas fa-exclamation-circle" style="font-size: 3rem; margin-bottom: 1rem; color: rgba(255,100,100,0.8);"></i>
                    <h2>خطأ في الاتصال</h2>
                    <p style="margin-top: 1rem;">لم نتمكن من جلب البيانات من Google Sheet. يرجى التأكد من أن الرابط صحيح وأن الصفحة منشورة.</p>
                </div>
            `;
        }

        // Render Entries
        function renderEntries(entries) {
            loader.style.display = 'none';
            grid.innerHTML = '';

            if (!entries || entries.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; color: var(--text-secondary); padding: 3rem;">
                        <i class="fas fa-book-open" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <h2>لا توجد يوميات بعد</h2>
                        <p style="margin-top: 1rem;">ابدأ الكتابة في Google Sheet وستظهر مدوناتك هنا تلقائياً.</p>
                    </div>
                `;
                return;
            }

            // Reverse entries so the newest one appears first
            const reversedEntries = [...entries].reverse();

            reversedEntries.forEach((entry, index) => {
                // Support multiple column names (English or Arabic)
                const date = entry.date || entry.createdAt || entry['التاريخ'] || entry['تاريخ'] || 'Unknown Date';
                const title = entry.title || entry.name || entry['العنوان'] || entry['عنوان'] || 'Untitled Entry';
                const content = entry.content || entry.text || entry.description || entry['المحتوى'] || entry['محتوى'] || entry['i'] || '';


                const card = document.createElement('article');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-date">${date}</span>
                        <i class="fas fa-feather-alt card-icon"></i>
                    </div>
                    <h2 class="card-title">${title}</h2>
                    <p class="card-preview">${content}</p>
                `;

                // Add click event for modal
                card.addEventListener('click', () => openModal(date, title, content));
                
                grid.appendChild(card);

                // GSAP Staggered Animation for Cards
                gsap.to(card, {
                    opacity: 1,
                    y: 0,
                    duration: 0.8,
                    delay: index * 0.15,
                    ease: "back.out(1.2)",
                    scrollTrigger: {
                        trigger: card,
                        start: "top 85%",
                        toggleActions: "play none none reverse"
                    }
                });
            });

            // Refresh ScrollTrigger after DOM changes
            ScrollTrigger.refresh();
        }

        // Modal Functions
        function openModal(date, title, content) {
            modalDate.textContent = date;
            modalTitle.textContent = title;
            
            // Format content with paragraphs
            modalBody.innerHTML = content.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal() {
            modal.classList.remove('active');
            setTimeout(() => {
                document.body.style.overflow = 'auto';
            }, 400); // Wait for transition
        }

        // Event Listeners
        modalCloseBtn.addEventListener('click', closeModal);
        
        // Close modal on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

        // Initialize application when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
